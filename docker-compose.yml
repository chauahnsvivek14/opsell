version: '3.8'

services:
  market-direction:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: market-direction-classifier
    ports:
      - "8000:8000"
    environment:
      - SERVICE_HOST=0.0.0.0
      - SERVICE_PORT=8000
      - SERVICE_WORKERS=4
    volumes:
      - ./logs:/var/log/opsell
      - ./.env:/app/.env:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - opsell-network
    labels:
      - "com.example.description=Market Direction Classifier Microservice"

  nginx:
    image: nginx:alpine
    container_name: opsell-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - market-direction
    restart: unless-stopped
    networks:
      - opsell-network

networks:
  opsell-network:
    driver: bridge
